[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  BUN_VERSION = "1.3.11"

# Production: main → sparkit.com.ar
[context.production]
  command = "bun run build"

# Staging: develop → deploy-preview gratuito de Netlify
[context.branch-deploy]
  command = "bun run build"

[context."develop"]
  command = "bun run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
